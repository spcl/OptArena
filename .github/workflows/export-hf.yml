name: Export HF Dataset

# Keep the HuggingFace dataset in lock-step with the kernel suite.
#
# The export is a PURE regenerator over the manifest tree (optarena/hf_export.py):
# nothing is cached in the repo, so adding a benchmark needs no dataset edit --
# this workflow rebuilds every row and (when HF_TOKEN is configured) republishes,
# tagged by the triggering commit. The completeness guard (tests/test_hf_export.py)
# already runs in the main CI, so a kernel that cannot export turns the PR red
# BEFORE it reaches main; this job only rebuilds + publishes the green result.
#
# Push is gated on the HF_TOKEN secret + HF_DATASET_REPO var: with neither set the
# job still runs (it builds + uploads the dataset as a workflow artifact for
# inspection) but performs no outward-facing publish.

on:
  push:
    branches: [ main ]
    paths:
      - 'optarena/benchmarks/**'
      - 'optarena/hf_export.py'
      - 'optarena/bindings/**'
      - 'optarena/spec.py'
      - '.github/workflows/export-hf.yml'
  workflow_dispatch:
    inputs:
      selector:
        description: 'kernel selector (track / dwarf / kernel or "all")'
        default: 'all'

concurrency:
  group: export-hf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    name: build + publish the HF dataset
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Job-level env so the publish step's `if` can see them (a step's own `env`
    # block is NOT visible to that step's `if` condition).
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_DATASET_REPO: ${{ vars.HF_DATASET_REPO }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements/hf.txt
          pip install -e .
      # ONE build: export-hf always writes the parquet (the artifact) and, when the
      # Hub is configured, pushes those SAME rows -- so the uploaded artifact and the
      # published dataset are byte-identical (no second, independent regeneration).
      - name: Build (+ publish if configured) the dataset
        run: |
          PUSH=""
          if [ -n "$HF_DATASET_REPO" ] && [ -n "$HF_TOKEN" ]; then
            PUSH="--push $HF_DATASET_REPO"
          fi
          python -m optarena.cli export-hf \
            --selector "${{ github.event.inputs.selector || 'all' }}" \
            --out optarena_hf.parquet $PUSH
      - name: Upload as a workflow artifact (always)
        # `always()` so the just-written parquet survives for inspection even when a
        # configured push fails (export-hf writes the file BEFORE pushing).
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: optarena-hf-dataset
          path: optarena_hf.parquet
          if-no-files-found: ignore
