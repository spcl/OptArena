name: CI

# One CPU runner, all tests as sequential phases (format -> unit categories -> e2e ->
# container). A single checkout + one dependency setup + one Pluto build feed every
# phase, so nothing is duplicated across runners. GPU frameworks (triton, tvm-gpu)
# self-skip here and run in agentbench-gpu.yml -- a dedicated GPU runner is future work.
#
# Phases:
#   0. format       changed files @ 120 cols (yapf / clang-format / fprettify)
#   -- setup (once): apt toolchain + Apptainer + pip (all frameworks) + Pluto --
#   1. structure    YAML + tree + hidden-test firewall + HF export
#   2. translations emit + compile + validate C / C++ / Fortran
#   3. agent-bench  tools client + no-op/BLAS optimizers, both modes, in-process judge
#   4. frameworks   cc / llvm / tvm-cpu / pluto / fp16 -- build + run + validate a kernel
#   5. e2e sweep    every kernel x every backend @ S (CPU-only, xfail-tracked)
#   6. container    build the agent-bench image + sudoless two-container launch

on:
  push:
    branches: [ main, extended, ci-fix ]
  pull_request:
    branches: [ main, extended, ci-fix ]
  merge_group:
    branches: [ main, extended, ci-fix ]

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  ci:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-ci') }}
    name: ci (format + unit + e2e, single CPU runner, phased)
    runs-on: ubuntu-latest
    # format + all unit categories + the exhaustive e2e sweep + the container build run
    # in sequence on one runner. The e2e sweep (~80 min, -n auto) and the cpu image build
    # dominate the wall-clock; 240 leaves margin.
    timeout-minutes: 240
    env:
      # bondhugula/pluto @ 0.12.0-33-gdc46216 -- pin for reproducibility, bump deliberately.
      PLUTO_COMMIT: dc462163c8b4fc97d378a4d245d1a64741cb4111
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so format's merge-base diff against the target branch resolves.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ---------- Phase 0: format (fast fail, before the heavy setup) ----------
      - name: Phase 0 -- format check (changed files @ 120 cols)
        run: |
          # yapf / fprettify / clang-format are all pip wheels (the clang-format wheel
          # ships the binary), so this phase needs no apt and runs before the toolchain.
          python -m pip install --upgrade pip
          python -m pip install yapf fprettify clang-format
          base="${{ github.event.pull_request.base.ref || 'main' }}"
          git fetch --no-tags origin "$base"
          python scripts/check_format.py --base "origin/$base"

      # ---------- Setup (once; shared by every test phase) ----------
      - name: Setup -- native toolchain + OpenBLAS + Apptainer prereqs
        run: |
          # build-essential: make + gcc + g++ -- the C/C++ backends + Pluto's `make`.
          #   (GitHub runners pre-install it, but name it so a self-hosted/bare runner
          #   works too -- verified against a clean ubuntu:24.04.)
          # gfortran/clang: judge compiles submissions + the C baseline.
          # pkg-config + libopenblas-dev: the BLAS optimizer links cblas_*.
          # libfftw3-dev: the vexx port test's C++ Fock oracle links -lfftw3.
          # rpm2cpio + cpio: prerequisites of Apptainer's unprivileged installer.
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran clang pkg-config libopenblas-dev libfftw3-dev rpm2cpio cpio

      - name: Setup -- Apptainer (unprivileged, to $HOME)
        run: |
          # Official SUDOLESS installer: prebuilt apptainer (+ fakeroot/squashfuse) into a
          # $HOME prefix. Appending to $GITHUB_PATH puts it on PATH for the later phases.
          curl -s https://raw.githubusercontent.com/apptainer/apptainer/main/tools/install-unprivileged.sh \
            | bash -s - "$HOME/apptainer"
          echo "$HOME/apptainer/bin" >> "$GITHUB_PATH"

      - name: Setup -- Python dependencies (all frameworks; one merged env)
        run: |
          # requirements.txt (numpy 2.x + core) + the translator stack + every framework
          # the phases exercise. tvm/dace/numba/pythran/jax/pyarrow co-resolve with
          # numpy 2.x. pytest-timeout for per-test caps; pytest-xdist for the e2e -n auto.
          python -m pip install -r requirements.txt \
            pytest pytest-timeout pytest-xdist sympy jinja2 cffi tree-sitter-language-pack psutil py-cpuinfo
          python -m pip install apache-tvm "jax[cpu]" pyarrow dace numba pythran
          python -m pip install -e .

      - name: Setup -- verify toolchain (fail fast on a missing dependency)
        run: |
          # Turn a silently-skipped test (needs OpenBLAS / apptainer) into a loud setup
          # error so a provisioning regression can't masquerade as a green run.
          missing=0
          for t in make gcc g++ gfortran clang pkg-config apptainer; do
            if command -v "$t" >/dev/null 2>&1; then
              printf '  ok    %-12s %s\n' "$t" "$(command -v "$t")"
            else
              printf '  MISS  %s\n' "$t"; missing=1
            fi
          done
          pkg-config --exists openblas || { echo '  MISS  openblas (pkg-config)'; missing=1; }
          [ "$missing" = 0 ] || { echo 'Toolchain incomplete -- see MISS lines above'; exit 1; }

      - name: Setup -- build Pluto (polyhedral source-to-source) against LLVM/clang 17
        # Enables the `pluto` framework (test_frameworks.py) + the e2e sweep's pluto
        # backend: polycc runs each translator-emitted <base>_pluto_input.c through the
        # polyhedral pipeline. HARD step (proven recipe -- containers/pluto.Dockerfile
        # builds the same way): a build regression fails the job loudly, not silently.
        run: |
          set -euo pipefail
          # clang-17 feeds pet via --with-clang-prefix; libgmp/flex/bison/texinfo/libltdl
          # build isl/cloog/candl; pkg-config + libyaml-dev are pet's configure deps.
          sudo apt-get install -y --no-install-recommends \
            clang-17 llvm-17 llvm-17-dev libclang-17-dev \
            autoconf automake libtool pkg-config libgmp-dev libyaml-dev flex bison texinfo libltdl-dev
          # pet prefers the monolithic -lclang-cpp, but Ubuntu ships only libclang-cpp.so.17
          # (no unversioned .so), so pet falls back to individual -lclang* libs and misses
          # -lclangASTMatchers. Add the symlink so pet links the one monolithic lib (all
          # clang symbols, ast_matchers included).
          sudo ln -sf /usr/lib/llvm-17/lib/libclang-cpp.so.17 /usr/lib/llvm-17/lib/libclang-cpp.so
          # cloog unconditionally builds doc/cloog.pdf via texi2dvi (wants a full TeX we do
          # not need); shadow texi2dvi with a no-op that just creates its -o target.
          printf '%s\n' '#!/bin/sh' \
            'out=; while [ $# -gt 0 ]; do [ "$1" = "-o" ] && { out=$2; shift; }; shift; done' \
            '[ -n "$out" ] && : > "$out"; exit 0' | sudo tee /usr/local/bin/texi2dvi >/dev/null
          sudo chmod +x /usr/local/bin/texi2dvi
          git clone --recursive https://github.com/bondhugula/pluto.git "$RUNNER_TEMP/pluto"
          cd "$RUNNER_TEMP/pluto"
          git checkout "$PLUTO_COMMIT"
          git submodule update --init --recursive
          ./autogen.sh
          ./configure --with-clang-prefix=/usr/lib/llvm-17 \
            CC=clang-17 CXX=clang++-17 CXXFLAGS='-std=c++17 -include cstdint'
          make -j"$(nproc)"
          sudo make install          # polycc + pluto -> /usr/local/bin
          sudo ldconfig
          # Smoke-test the built polycc on a trivial affine scop -- proves it RUNS, not
          # just that it installed. (`polycc --version` forwards to the pluto binary,
          # which exits non-zero on "no input file", so it is NOT a usable check under
          # set -e.) Multidim array so pet extracts the SCoP; output must be non-empty.
          printf '%s\n' \
            '#include <stdint.h>' \
            'void mm(const int64_t N, double (*restrict A)[N], double (*restrict B)[N], double (*restrict C)[N]) {' \
            '#pragma scop' \
            '  for (int64_t i=0;i<N;i++) for (int64_t j=0;j<N;j++) for (int64_t k=0;k<N;k++) C[i][j]+=A[i][k]*B[k][j];' \
            '#pragma endscop' \
            '}' > "$RUNNER_TEMP/smoke.c"
          ( cd "$RUNNER_TEMP" && polycc --pet smoke.c -o smoke_out.c && test -s smoke_out.c )
          echo "pluto OK -- polycc built + transforms a scop: $(command -v polycc)"

      # ---------- Test phases ----------
      - name: Phase 1 -- YAML + tree + hidden-test firewall + HF export
        run: |
          python -m pytest -q -p no:cacheprovider --timeout=600 \
            tests/test_yaml_style.py \
            tests/test_tree_structure.py \
            tests/test_firewall.py \
            tests/test_hf_export.py

      - name: Phase 2 -- translations (C / C++ / Fortran emit + compile + validate)
        run: |
          python -m pytest -q -p no:cacheprovider tests/test_native_autogen.py

      - name: Phase 2b -- port fidelity (numpy port vs original C/C++/Fortran reference)
        # Each tests/ports/<kernel>/ builds the upstream reference (e.g. vexx's FFTW
        # Fock oracle) and grades the numpy port against it. A missing toolchain/lib
        # self-skips (pytest.skip), so this never reds the gate on a bare runner.
        run: |
          python -m pytest -q -p no:cacheprovider -rs --timeout=600 tests/ports/

      - name: Phase 3 -- agent-bench (tools + no-op/BLAS optimizers, both modes, in-proc judge)
        run: |
          python -m pytest -q -p no:cacheprovider --timeout=600 \
            tests/test_agent_tools.py \
            tests/test_noop_optimizer.py \
            tests/test_blas_optimizer.py \
            tests/test_agent_service.py \
            tests/test_token_usage.py \
            tests/test_harbor_adapter.py \
            tests/test_packaging.py \
            tests/test_optimizer_plugin.py \
            tests/test_agent_bench.py

      - name: Phase 4 -- codegen frameworks + fp16 (build + run + validate a kernel)
        # cc/llvm/tvm_cpu/pluto and fp16-via-jax run here; polly (needs a Polly-enabled
        # clang) and the GPU frameworks (triton, tvm-gpu) self-skip when their toolchain
        # or GPU is absent (the GPU ones run in agentbench-gpu.yml). -rs surfaces skips.
        env:
          OPTARENA_TVM_NOTUNE: "1"
          OPTARENA_TVM_METASCHEDULE_TRIALS: "2"
        run: |
          python -m pytest -q -p no:cacheprovider -rs --timeout=900 \
            tests/test_frameworks.py \
            tests/test_fp16.py

      - name: Phase 5 -- e2e numerical sweep (every kernel x every backend @ S, CPU-only)
        # Emits + compiles + runs every foundation/HPC kernel at S across C/C++/Fortran/
        # numba/pythran/jax/pluto and validates vs the NumPy reference. -n auto fits the
        # ~80 min serial sweep into budget. Currently-failing (kernel, backend) pairs are
        # xfail-tracked in tests/e2e_known_failures.txt, so this fails only on regression.
        run: |
          python -m pytest -q -p no:cacheprovider -n auto tests/test_e2e_numerical.py

      - name: Phase 6a -- build the agent-bench image (unprivileged fakeroot)
        run: |
          # uidmap provides newuidmap/newgidmap that --fakeroot needs to map the runner
          # user's /etc/subuid range without root.
          sudo apt-get install -y uidmap
          apptainer build --fakeroot optarena-cpu.sif containers/cpu.def

      - name: Phase 6b -- container functionality (sudoless two-container launch)
        env:
          OPTARENA_JUDGE_SIF: ${{ github.workspace }}/optarena-cpu.sif
        run: |
          python -m pytest -q -p no:cacheprovider --timeout=900 tests/test_container_launch.py
