name: "OptArena CI setup"
description: >
  Native toolchain (make/gcc/g++/gfortran/clang + OpenBLAS + FFTW) and the base Python
  deps every CI runner shares. Job-specific extras (tvm, Pluto, gt4py, Apptainer) stay in
  the job so only the runner that needs one pays for it.

runs:
  using: composite
  steps:
    - name: Native toolchain + OpenBLAS + FFTW
      shell: bash
      run: |
        # build-essential: make + gcc + g++ (C/C++ backends). gfortran/clang: Fortran backend
        # + judge. pkg-config + libopenblas-dev: the BLAS optimizer links cblas_*. libfftw3-dev:
        # the vexx port oracle links -lfftw3.
        sudo apt-get update
        sudo apt-get install -y build-essential gfortran clang pkg-config libopenblas-dev libfftw3-dev

    - name: Base Python deps (translators + the frameworks every phase shares)
      shell: bash
      run: |
        # requirements.txt (numpy 2.x + core) + the translator stack + numba/pythran/jax/dace,
        # which co-resolve with numpy 2.x. tvm/gt4py/pluto/apptainer are job-specific and added
        # by the job that needs them. pytest-xdist gives every runner its own -n auto.
        #
        # Retry every install: CI runners hit transient PyPI IncompleteRead/ProtocolError on
        # large sdists (dace). CRUCIAL: ``pip install -e .`` (which installs numpyto_common --
        # without it every tests/conftest import dies) runs BEFORE the flaky framework downloads,
        # in its own retried call, so a framework network blip can never skip the editable install.
        pip_retry() { for i in 1 2 3 4 5; do python -m pip install "$@" && return 0; echo "pip attempt $i failed; retrying in $((i*5))s"; sleep $((i*5)); done; return 1; }
        python -m pip install --upgrade pip
        pip_retry -r requirements.txt \
          pytest pytest-timeout pytest-xdist sympy jinja2 cffi tree-sitter-language-pack psutil py-cpuinfo
        pip_retry -e .
        # DaCe: editable install of spcl/dace @ extended (the branch OptArena develops against), NOT the
        # stock PyPI wheel. extended carries compiler.build_mode=native, which compiles each SDFG by
        # invoking the compiler directly and skips the per-SDFG cmake configure -- cutting the framework
        # + translator SDFG build time. Shallow clone keeps it fast; editable so the native codegen loads.
        git clone --depth 1 --branch extended https://github.com/spcl/dace.git "$RUNNER_TEMP/dace"
        pip_retry -e "$RUNNER_TEMP/dace"
        pip_retry "jax[cpu]" numba pythran pyarrow
        # Turn on native SDFG builds for every subsequent step in the job (no cmake per SDFG).
        echo "DACE_compiler_build_mode=native" >> "$GITHUB_ENV"

    - name: Verify common toolchain (fail fast on a missing dependency)
      shell: bash
      run: |
        # Turn a silently-skipped test into a loud setup error so a provisioning regression
        # cannot masquerade as a green run. (Apptainer/polycc are verified in their own jobs.)
        missing=0
        for t in make gcc g++ gfortran clang pkg-config; do
          if command -v "$t" >/dev/null 2>&1; then
            printf '  ok    %-12s %s\n' "$t" "$(command -v "$t")"
          else
            printf '  MISS  %s\n' "$t"; missing=1
          fi
        done
        pkg-config --exists openblas || { echo '  MISS  openblas (pkg-config)'; missing=1; }
        [ "$missing" = 0 ] || { echo 'Toolchain incomplete -- see MISS lines above'; exit 1; }
