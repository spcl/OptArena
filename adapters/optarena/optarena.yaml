# Harbor job config for the OptArena adapter (harbor run -c adapters/optarena/optarena.yaml).
# Fields map to harbor.models.job.config.JobConfig.
#
# Generate the tasks first:
#   python adapters/optarena/run_adapter.py --output-dir adapters/optarena/tasks --selector all
job_name: optarena
jobs_dir: adapters/optarena/runs        # where trial results are written
datasets:
  - path: adapters/optarena/tasks       # the generated task directories (the task source)
n_attempts: 1
n_concurrent_trials: 1                   # one trial at a time keeps timing clean; raise it to run many
                                         # agents in parallel and serialize timing via
                                         # measurement.timing_lock (see docs/RUNTIME.md)
environment:
  type: singularity                      # container backend: docker | singularity (Apptainer, rootless).
                                         # Override per-run with `harbor run --env <type>`. For LOCAL
                                         # sudoless runs without Harbor use udocker/apptainer (RUNTIME.md).
# Point `agents:` at the coding agent(s) you are evaluating (see Harbor docs). No
# oracle solution is shipped, so a real agent must be configured to run anything.
# agents:
#   - name: <your-agent>
