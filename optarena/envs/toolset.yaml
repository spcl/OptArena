# Host-tool DISCOVERY wishlist -- what `optarena/agent_bench/discover_tools.py` probes for on
# a user's machine (Linux / WSL / macOS; ubuntu / fedora / opensuse). Distinct
# from optarena/envs/compilers.yaml, which is the BUILD table (how to compile);
# this is the FIND table (what exists + how to detect + whether it is required).
#
# Detection kinds:
#   binary   shutil.which() over `names` (prefer-latest order) + a version probe.
#   library  pkg-config <pkgconfig>, else a shared object `soname` on the loader
#            path (ldconfig / DYLD / CUDA+ROCm lib dirs), else a `header` on the
#            include path. Found if ANY strategy hits.
#   header   header-only: just look for `header` on the include path.
#
# requirement: `required_on` lists the hardware targets that NEED the tool (a
# missing one is a hard gap for that target); anything else is optional (it
# enriches the "default" stack but never gates).

compilers:
  gcc:
    detect: binary
    names: [gcc-15, gcc-14, gcc-13, gcc-12, gcc-11, gcc]
    version_arg: [-dumpfullversion]
    required_on: [cpu, nvidia, amd]
  llvm:
    detect: binary
    names: [clang-20, clang-19, clang-18, clang-17, clang-16, clang]
    version_arg: [--version]
    required_on: [cpu, nvidia, amd]
  gfortran:
    detect: binary
    names: [gfortran-15, gfortran-14, gfortran-13, gfortran-12, gfortran]
    version_arg: [-dumpfullversion]
    required_on: [cpu, nvidia, amd]
  intel_oneapi:            # optional: icx/icpx (C/C++) + ifx (Fortran)
    detect: binary
    names: [icpx, icx, ifx]
    version_arg: [--version]
  nvhpc:                   # optional: NVIDIA HPC SDK compilers
    detect: binary
    names: [nvc++, nvc, nvfortran]
    version_arg: [--version]
  amdclang:                # AMD's clang -- required to target AMD GPUs
    detect: binary
    names: [amdclang++, amdclang]
    version_arg: [--version]
    required_on: [amd]
  nvcc:                    # CUDA compiler -- bare-bones NVIDIA requirement
    detect: binary
    names: [nvcc]
    version_arg: [--version]
    required_on: [nvidia]
  hipcc:                   # HIP compiler -- required to target AMD GPUs
    detect: binary
    names: [hipcc]
    version_arg: [--version]
    required_on: [amd]

# NVIDIA math libraries. nvcc alone = bare-bones; the "default" NVIDIA stack also
# wants these (cuBLAS et al. ship with the CUDA toolkit; cuTENSOR is separate).
cuda_libraries:
  cublas:   {detect: library, soname: libcublas.so,   header: cublas_v2.h}
  cusparse: {detect: library, soname: libcusparse.so, header: cusparse.h}
  cusolver: {detect: library, soname: libcusolver.so, header: cusolverDn.h}
  cufft:    {detect: library, soname: libcufft.so,    header: cufft.h}
  cub:      {detect: header,  header: cub/cub.cuh}
  cutensor: {detect: library, soname: libcutensor.so, header: cutensor.h}

# AMD ROCm math libraries (the "default" AMD stack on top of hipcc/amdclang).
hip_libraries:
  hipblas:   {detect: library, soname: libhipblas.so,      header: hipblas.h}
  hipcub:    {detect: header,  header: hipcub/hipcub.hpp}
  rocblas:   {detect: library, soname: librocblas.so,      header: rocblas.h}
  rocsparse: {detect: library, soname: librocsparse.so,    header: rocsparse.h}
  rocsolver: {detect: library, soname: librocsolver.so,    header: rocsolver/rocsolver.h}
  rocfft:    {detect: library, soname: librocfft.so,       header: rocfft/rocfft.h}
  hiptensor: {detect: library, soname: libhiptensor.so,    header: hiptensor.h}

# Common HPC numeric / IO libraries -- all optional, all enrich the default env.
hpc_libraries:
  blas:      {detect: library, pkgconfig: [openblas, blas], soname: [libopenblas.so, libblas.so]}
  lapack:    {detect: library, pkgconfig: lapack, soname: liblapack.so}
  scalapack: {detect: library, pkgconfig: scalapack, soname: libscalapack.so}
  fftw:      {detect: library, pkgconfig: fftw3, soname: libfftw3.so}
  hdf5:      {detect: library, pkgconfig: hdf5, soname: libhdf5.so, header: hdf5.h}
  netcdf:    {detect: library, pkgconfig: netcdf, soname: libnetcdf.so, header: netcdf.h}
  mkl:       {detect: library, pkgconfig: mkl-dynamic-lp64-iomp, soname: libmkl_rt.so}
  slate:     {detect: library, soname: libslate.so, header: slate/slate.hh}
  magma:     {detect: library, pkgconfig: magma, soname: libmagma.so, header: magma_v2.h}
  mpi:       {detect: library, pkgconfig: [ompi, mpich], soname: libmpi.so, header: mpi.h}
  gsl:       {detect: library, pkgconfig: gsl, soname: libgsl.so, header: gsl/gsl_math.h}
  eigen:     {detect: header,  header: eigen3/Eigen/Dense}
  boost:     {detect: header,  header: boost/version.hpp}
  suitesparse: {detect: library, soname: libsuitesparseconfig.so, header: suitesparse/umfpack.h}
  metis:     {detect: library, soname: libmetis.so, header: metis.h}
  parmetis:  {detect: library, soname: libparmetis.so, header: parmetis.h}
  petsc:     {detect: library, pkgconfig: PETSc, soname: libpetsc.so, header: petsc.h}
  superlu:   {detect: library, soname: libsuperlu.so, header: superlu/slu_ddefs.h}
  mumps:     {detect: library, soname: libdmumps.so, header: dmumps_c.h}
  hypre:     {detect: library, soname: libHYPRE.so, header: HYPRE.h}
  sundials:  {detect: library, soname: libsundials_cvode.so, header: sundials/sundials_types.h}
  blis:      {detect: library, pkgconfig: blis, soname: libblis.so}
  ucx:       {detect: library, pkgconfig: ucx, soname: libucp.so}
  lapacke:   {detect: library, pkgconfig: lapacke, soname: liblapacke.so, header: lapacke.h}
  armadillo: {detect: library, pkgconfig: armadillo, soname: libarmadillo.so, header: armadillo}
  tbb:       {detect: library, pkgconfig: tbb, soname: libtbb.so, header: tbb/tbb.h}
  sleef:     {detect: library, soname: libsleef.so, header: sleef.h}
  xsimd:     {detect: header,  header: xsimd/xsimd.hpp}
  highway:   {detect: library, pkgconfig: libhwy, soname: libhwy.so, header: hwy/highway.h}
  hptt:      {detect: library, soname: libhptt.so, header: hptt.h}    # built from source (containers/build-hptt.sh)
  numa:      {detect: library, soname: libnuma.so, header: numa.h}
  hwloc:     {detect: library, pkgconfig: hwloc, soname: libhwloc.so, header: hwloc.h}
  fftw_mpi:  {detect: library, soname: libfftw3_mpi.so, header: fftw3-mpi.h}
