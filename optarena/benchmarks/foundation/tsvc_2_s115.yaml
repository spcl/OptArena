# OptArena benchmark manifest -- adding a benchmark: see README.md.
# Schema: optarena/schemas/bench_spec.schema.yaml
name: TSVC s115
kind: microkernel
level: 1
parameters:
  S:
    LEN_2D: 64
  M:
    LEN_2D: 256
  L:
    LEN_2D: 512
  XL:
    LEN_2D: 23170
init:
  arrays:
    a: (LEN_2D,)
    aa: (LEN_2D,LEN_2D)
output_args:
- a
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: linear dependence
  optimization: triangular loop vectorization
  puzzle: >-
    Triangular SAXPY a[i] -= aa[j,i] * a[j] where the inner i-loop starts at
    j+1. The outer index j both feeds the scalar a[j] and bounds the inner
    trip count, so the compiler must handle the triangular iteration space and
    the a[j]/a[i] carried dependence to vectorize the inner update.
