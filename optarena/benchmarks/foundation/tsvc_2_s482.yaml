# OptArena benchmark manifest -- adding a benchmark: see README.md.
# Schema: optarena/schemas/bench_spec.schema.yaml
name: TSVC s482
kind: microkernel
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 178956971
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
    c: (LEN_1D,)
output_args:
- a
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: control flow
  optimization: conditional early loop exit (data-dependent break)
  puzzle: >-
    Vector plus-scalar-times-vector update a[i] = a[i] + b[i]*c[i] guarded by
    a data-dependent break: the loop exits the first time c[i] > b[i]. The
    exit condition depends on values only known at runtime, so the trip count
    is not a compile-time affine bound; a vectorizer must speculate a full
    vector, detect the first lane where the condition fires, and commit only
    the stores up to and including that lane -- computation happens before the
    exit, so the triggering iteration's update must be kept.
