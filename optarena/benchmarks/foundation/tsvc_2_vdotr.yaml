# OptArena benchmark manifest -- adding a benchmark: see README.md.
# Schema: optarena/schemas/bench_spec.schema.yaml
name: TSVC vdotr
kind: microkernel
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 178956971
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
    dot_out: (LEN_1D,)
output_args:
- dot_out
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: reductions
  optimization: dot-product (sum-of-products) reduction
  puzzle: >-
    Accumulates dot_out += a[i]*b[i], a floating-point dot-product reduction.
    The single accumulator carries a loop-carried dependence across every
    iteration, so a vectorizer must recognize the reduction idiom and use
    partial-sum vectors (plus a final horizontal add), which is only legal
    when reassociation of floating-point addition is permitted.
