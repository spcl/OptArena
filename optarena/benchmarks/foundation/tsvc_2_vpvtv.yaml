# OptArena benchmark manifest -- adding a benchmark: see README.md.
name: TSVC vpvtv
kind: microkernel
level: 1
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 178956971
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
    c: (LEN_1D,)
output_args:
- a
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: control flow
  optimization: vector plus vector-times-vector (elementwise FMA)
  puzzle: >-
    Elementwise a[i] = a[i] + b[i]*c[i] over three stride-1 streams, a
    per-element multiply-add with no loop-carried dependence. A control idiom
    mapping to a vector FMA, distinguished from vpvts by using a vector rather
    than a scalar multiplier.
