# OptArena benchmark manifest -- adding a benchmark: see README.md.
# Schema: optarena/schemas/bench_spec.schema.yaml
name: TSVC s161
kind: microkernel
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 107374183
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
    c: (LEN_1D,)
    d: (LEN_1D,)
    e: (LEN_1D,)
output_args:
- a
- c
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  category: control flow
  optimization: if-conversion / mutually exclusive regions
  puzzle: >-
    Loop-independent dependence between statements in mutually exclusive
    branches: one branch does c[i+1] = a[i] + d[i]*d[i], the other a[i] = c[i]
    + d[i]*e[i]. The vectorizer must recognize that only one arm runs per
    iteration and if-convert the control flow into predicated (masked) vector
    operations without violating the cross-arm dependence.
