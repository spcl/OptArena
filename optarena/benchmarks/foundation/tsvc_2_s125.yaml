# OptArena benchmark manifest -- adding a benchmark: see README.md.
name: TSVC s125
kind: microkernel
level: 1
parameters:
  S:
    LEN_2D: 64
  M:
    LEN_2D: 256
  L:
    LEN_2D: 512
  XL:
    LEN_2D: 13377
init:
  arrays:
    flat_2d_array: (LEN_2D * LEN_2D,)
    aa: (LEN_2D,LEN_2D)
    bb: (LEN_2D,LEN_2D)
    cc: (LEN_2D,LEN_2D)
output_args:
- flat_2d_array
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: induction variables
  optimization: induction variable recognition
  puzzle: >-
    Induction variable spanning two nested loops: the flat store index k is
    incremented once per inner iteration across both the i and j loops, writing
    flat_2d_array[k] = aa[i,j] + bb[i,j]*cc[i,j]. The compiler must recognize
    that k equals the affine expression i*LEN_2D + j so the nest can be collapsed
    into a single stride-1 loop and vectorized.
