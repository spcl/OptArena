# OptArena benchmark manifest -- adding a benchmark: see README.md.
# Schema: optarena/schemas/bench_spec.schema.yaml
name: TSVC s151
kind: microkernel
level: 1
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 268435455
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
output_args:
- a
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: interprocedural data flow
  optimization: interprocedural data flow analysis
  puzzle: >-
    Passing parameter information into a subroutine: the original calls a helper
    s151s(a, b, 1) whose body is a[i] = a[i+m] + b[i], inlined here as a[i] =
    a[i+1] + b[i]. Vectorizing requires interprocedural analysis to propagate the
    argument m = 1 into the callee and establish that the loop-carried dependence
    is a benign forward one.
