# OptArena benchmark manifest -- adding a benchmark: see README.md.
# Schema: optarena/schemas/bench_spec.schema.yaml
name: TSVC vsumr
kind: microkernel
level: 1
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 536870910
init:
  arrays:
    a: (LEN_1D,)
    sum_out: (1,)
output_args:
- sum_out
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: reductions
  optimization: sum reduction
  puzzle: >-
    Accumulates s += a[i] over the array, a plain floating-point sum reduction
    written back to sum_out. The single accumulator is a loop-carried
    dependence, so vectorization requires the reduction idiom (partial-sum
    vectors plus a final horizontal add) and is only legal under
    floating-point reassociation.
