name: TSVC s272
kind: microkernel
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 107374183
init:
  output_args:
  - threshold
  - a
  - b
  - c
  - d
  - e
  scalars:
    threshold: 1
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
    c: (LEN_1D,)
    d: (LEN_1D,)
    e: (LEN_1D,)
output_args:
- a
- b
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  category: control flow
  optimization: loop with independent conditional
  puzzle: >-
    Two independent accumulations (a[i] and b[i]) are both guarded by the same
    condition e[i] >= threshold, and neither statement depends on the other or on
    prior iterations. The vectorizer if-converts the branch to a mask and applies
    it to both masked FMA updates; because the guard is independent per lane and
    there is no loop-carried dependence, the whole loop vectorizes cleanly via
    predication.
