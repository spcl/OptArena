# OptArena benchmark manifest -- adding a benchmark: see README.md.
# Schema: optarena/schemas/bench_spec.schema.yaml
name: TSVC s422
kind: microkernel
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 536608767
init:
  arrays:
    a: (LEN_1D,)
    flat_2d_array: (LEN_1D * LEN_1D,)
output_args:
- flat_2d_array
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  category: storage classes and equivalencing
  optimization: anti-dependence with a distance threshold of 4
  puzzle: >-
    Two overlapping views of one COMMON/equivalenced array: flat_2d_array[4+i] =
    flat_2d_array[8+i] + a[i]. The write and read differ by a constant offset of
    4, giving a backward anti-dependence of distance 4. It is only vectorizable
    if the SIMD width stays at or below that threshold, so the compiler must
    reason about the dependence distance rather than the array names.
