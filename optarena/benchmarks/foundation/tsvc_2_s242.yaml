# OptArena benchmark manifest -- adding a benchmark: see README.md.
name: TSVC s242
kind: microkernel
level: 1
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 134217727
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
    c: (LEN_1D,)
    d: (LEN_1D,)
output_args:
- a
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: node splitting
  optimization: node splitting
  puzzle: >-
    First-order recurrence a[i]=a[i-1]+0.5+1.0+b[i]+c[i]+d[i] carries a true
    dependence through a, so it is a genuine scan and not directly vectorizable;
    node splitting isolates the recurrent add from the independent b+c+d sum
    that a vectorizer can still compute in parallel.
