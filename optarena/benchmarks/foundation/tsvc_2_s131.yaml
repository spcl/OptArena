# OptArena benchmark manifest -- adding a benchmark: see README.md.
# Schema: optarena/schemas/bench_spec.schema.yaml
name: TSVC s131
kind: microkernel
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 268435455
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
output_args:
- a
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: global data flow
  optimization: forward substitution
  puzzle: >-
    Forward substitution of a global constant offset: a[i] = a[i+m] + b[i] with
    m = 1 propagated in, giving a[i] = a[i+1] + b[i]. Only after global data-flow
    analysis substitutes the value of m can the compiler prove the +1 read is
    ahead of the write (a benign, forward loop-carried dependence) and vectorize
    the loop.
