# OptArena benchmark manifest -- adding a benchmark: see README.md.
# Schema: optarena/schemas/bench_spec.schema.yaml
name: TSVC s1244
kind: microkernel
level: 1
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 134217727
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
    c: (LEN_1D,)
    d: (LEN_1D,)
output_args:
- a
- d
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: node splitting
  optimization: node splitting
  puzzle: >-
    Cycle with both a true and an anti dependence: a[i] is defined from b/c and
    then d[i] reads a[i] and a[i+1], while the next iteration overwrites a[i+1].
    The statement pair forms a dependence cycle that blocks direct vectorization;
    the compiler must split the node (e.g. buffer a[i+1] into a temporary) to
    break the cycle before the two statements can be vectorized separately.
