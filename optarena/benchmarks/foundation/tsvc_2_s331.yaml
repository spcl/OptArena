name: TSVC s331
kind: microkernel
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 536870909
init:
  arrays:
    a: (LEN_1D,)
    b: (2,)
output_args:
- b
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  category: search loops
  optimization: find last index satisfying a condition
  puzzle: >-
    Search loop that records the last index where a[i] < 0 by unconditionally
    overwriting j on every match, so the answer is the final qualifying i. The
    loop-carried scalar j and data-dependent update resist naive vectorization;
    probes whether a compiler recognizes a last-true search reducible to a masked
    index-max reduction.
