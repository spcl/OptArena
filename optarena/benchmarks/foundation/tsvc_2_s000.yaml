# OptArena benchmark manifest -- adding a benchmark: see README.md.
name: TSVC s000
kind: microkernel
level: 1
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 268435455
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
output_args:
- a
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: baseline
  optimization: straightforward vectorization
  puzzle: >-
    Baseline stride-1 loop a[i] = b[i] + 1 with no loop-carried dependence; the
    trivial case every vectorizer must handle. Used as the reference point the
    other, harder TSVC loops are measured against.
