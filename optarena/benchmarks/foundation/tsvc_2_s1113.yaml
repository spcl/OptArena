# OptArena benchmark manifest -- adding a benchmark: see README.md.
# Schema: optarena/schemas/bench_spec.schema.yaml
name: TSVC s1113
kind: microkernel
level: 1
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 268435455
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
output_args:
- a
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: linear dependence
  optimization: dependence analysis
  puzzle: >-
    a[i] = a[LEN_1D/2] + b[i] reads the single fixed midpoint element a[N/2] on
    every iteration. There is exactly one iteration (i == N/2) that both reads
    and writes that location, creating a lone crossing dependence; the
    vectorizer must isolate that one iteration rather than serialize the whole
    loop.
