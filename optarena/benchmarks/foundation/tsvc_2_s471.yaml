# OptArena benchmark manifest -- adding a benchmark: see README.md.
# Schema: optarena/schemas/bench_spec.schema.yaml
name: TSVC s471
kind: microkernel
level: 1
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 107374183
init:
  arrays:
    x: (LEN_1D,)
    b: (LEN_1D,)
    c: (LEN_1D,)
    d: (LEN_1D,)
    e: (LEN_1D,)
output_args:
- x
- b
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  category: call statements
  optimization: inlining a called subroutine into the loop body
  puzzle: >-
    The loop contains two updates -- x[i] = b[i] + d[i]*d[i] and b[i] = c[i] +
    d[i]*e[i] -- where the second was originally a subroutine call. A vectorizer
    must inline the call to see there is no cross-iteration dependence (only a
    within-iteration write to b after its read), after which both statements
    vectorize as independent stride-1 updates.
