# OptArena benchmark manifest -- adding a benchmark: see README.md.
name: TSVC s318
kind: microkernel
level: 2
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 536870910
init:
  output_args:
  - inc
  - a
  - result
  scalars:
    inc: 1
  arrays:
    a: (LEN_1D,)
    result: (1,)
output_args:
- result
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: reductions
  optimization: isamax, max absolute value with stride not equal to 1
  puzzle: >-
    BLAS isamax: find the index of the largest absolute value, but the array is
    walked with a non-unit stride (k += inc). The compiler must vectorize a
    max-with-index (argmax) reduction over abs values while handling strided
    gathers, combining strided access, abs, and coupled value/index reduction.
