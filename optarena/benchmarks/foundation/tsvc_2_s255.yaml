# OptArena benchmark manifest -- adding a benchmark: see README.md.
# Schema: optarena/schemas/bench_spec.schema.yaml
name: TSVC s255
kind: microkernel
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 268435455
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
output_args:
- a
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: scalar and array expansion
  optimization: scalar expansion of carry-around variables, 2 levels
  puzzle: >-
    Two carry-around scalars x and y hold b[i-1] and b[i-2] via a two-stage
    rotation (y=x; x=b[i]), so a[i]=(b[i]+x+y)*.333 is a 3-point stencil hidden
    behind chained scalars. Vectorization requires expanding both carry
    variables at once, one level harder than s254's single carry.
