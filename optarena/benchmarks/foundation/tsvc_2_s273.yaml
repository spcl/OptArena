taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  category: control flow
  optimization: simple loop with dependent conditional
  puzzle: >-
    The branch guard depends on a value computed earlier in the same iteration:
    a[i] is updated first, then the condition a[i] < 0 decides whether b[i] is
    updated, and c[i] uses the new a[i] afterwards. The vectorizer must respect
    the intra-iteration ordering -- derive the mask from the freshly computed a[i]
    before applying the masked b[i] update -- which is harder than an independent
    conditional but still has no cross-iteration dependence.
