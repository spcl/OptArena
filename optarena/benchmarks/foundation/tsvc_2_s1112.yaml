# OptArena benchmark manifest -- adding a benchmark: see README.md.
# Schema: optarena/schemas/bench_spec.schema.yaml
name: TSVC s1112
kind: microkernel
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 268435455
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
output_args:
- a
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: linear dependence
  optimization: loop reversal
  puzzle: >-
    Descending loop a[i] = b[i] + 1 iterating from high index to low. The
    computation itself is dependence-free, so the vectorizer must recognize
    that the backward iteration order is immaterial and reverse the loop into a
    normal forward stride-1 vector sweep.
