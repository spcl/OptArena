# OptArena benchmark manifest -- adding a benchmark: see README.md.
# Schema: optarena/schemas/bench_spec.schema.yaml
name: TSVC vpv
kind: microkernel
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 268435455
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
output_args:
- a
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: control flow
  optimization: vector plus vector (elementwise add)
  puzzle: >-
    Elementwise a[i] = a[i] + b[i]. A dependence-free stride-1 add mapping
    directly to a single SIMD add; a control (reference) idiom the harder
    control-flow loops are measured against.
