taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  category: recurrences
  optimization: coupled recurrence
  puzzle: >-
    Coupled recurrence: a[i] uses b[i-1], then b[i] is recomputed from the new
    a[i], so two arrays feed each other across iterations. The mutual
    loop-carried dependence blocks straight vectorization; probes whether a
    compiler can analyze intertwined recurrences rather than treating the two
    assignments as independent SIMD statements.
