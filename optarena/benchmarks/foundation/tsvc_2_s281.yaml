# OptArena benchmark manifest -- adding a benchmark: see README.md.
# Schema: optarena/schemas/bench_spec.schema.yaml
name: TSVC s281
kind: microkernel
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 178956971
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
    c: (LEN_1D,)
output_args:
- a
- b
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  category: crossing thresholds
  optimization: index set splitting, reverse data access
  puzzle: >-
    Each iteration reads a from the opposite end (a[LEN-i-1]) while writing a[i]
    forward, so the read and write indices cross midway through the loop. Before
    the crossing point a[LEN-i-1] still holds its old value; after it, the slot
    has already been overwritten, so the two halves have different dependence
    behaviour. The vectorizer must recognize the reverse access and split the
    index set at the crossing threshold, vectorizing each half (with a reversed
    load for the a[LEN-i-1] term) so results match the scalar order.
