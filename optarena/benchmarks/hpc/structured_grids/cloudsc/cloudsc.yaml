# Co-located benchmark manifest (CLOUDSC -- ECMWF IFS cloud microphysics).
# Schema: optarena/schemas/bench_spec.schema.json
# Sizes: nlev = vertical levels, klon = horizontal block (columns). Paper size
# is the dwarf-p-cloudsc reference grid (nlev=137, klon=100; the operational IFS
# L137 vertical resolution).
#
# provenance: input data reproduces the ECMWF dwarf-p-cloudsc serialbox reference
# input (input_<FIELD>.dat + MetaData-input.json; Apache-2.0, see NOTICE) via the
# per-level moments committed in cloudsc_reference_profiles.npz. The initializer
# is precondition-constrained (physically valid atmosphere); regenerate the
# fixture with generate_reference_profiles.py. See cloudsc.py for the per-field
# provenance and data-validity rationale.
name: Cloud Microphysics (CLOUDSC)
short_name: cloudsc
module_name: cloudsc
func_name: cloudsc
kind: microapp
level: 3
parameters:
  # S correctness preset: small, valid, fast. nlev must exceed ncldtop (=15, the
  # level where cloudsc_numpy's microphysics loop starts) so the kernel exercises
  # its real branches; 30 gives a generous active depth.
  S:
    nlev: 30
    klon: 256
  M:
    nlev: 60
    klon: 1024
  L:
    nlev: 90
    klon: 8192
  XL:
    nlev: 137
    klon: 100
  # Shape fuzzing: both sizes are free roots; every field shape derives from them
  # (init interpolates the reference profiles onto any nlev). nlev floor 16 keeps
  # the microphysics loop (jk in [ncldtop=15, nlev]) non-empty.
  fuzzed:
    nlev: [16, 137]
    klon: [64, 1024]
init:
  func_name: initialize
  input_args:
  - nlev
  - klon
  output_args:
  - pt
