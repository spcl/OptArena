# Co-located benchmark manifest -- FV3 x-direction Piecewise-Parabolic-Method
# (PPM) advective flux operator, "xppm".
#
# Provenance: ported from NOAA-GFDL/PyFV3 (package pyFV3), Apache-2.0
#   pyFV3/stencils/xppm.py + pyFV3/stencils/ppm.py
#   https://github.com/NOAA-GFDL/PyFV3
# The GTScript stencil is rewritten as self-contained numpy (no gt4py dep) so
# the OptArena translators can emit C/C++/Fortran. Ports the mord < 8 path
# (iord in {5,6,7}) in full, including the grid_type < 3 cubed-sphere edge
# regions; iord >= 8 (ord8plus) is out of scope (see fv3_xppm_numpy.py).
#
# Schema: optarena/schemas/bench_spec.schema.yaml
# Sizes: ni/nj/nk = interior cubed-sphere tile extents (x, y, z). The padded
# x-extent is nx = nhalo + ni + nhalo with nhalo = 3.
name: FV3 x-PPM Advective Flux (xppm)
short_name: fv3_xppm
module_name: fv3_xppm
func_name: fv3_xppm
kind: microapp
parameters:
  S:
    ni: 24
    nj: 24
    nk: 8
  M:
    ni: 48
    nj: 48
    nk: 32
  L:
    ni: 96
    nj: 96
    nk: 64
init:
  func_name: initialize
  input_args:
  - ni
  - nj
  - nk
  - iord
  - grid_type
  output_args:
  - q
  - courant
  - dxa
  - xflux
  - nhalo
  - ni
  - nj
  - nk
  - iord
  - grid_type
  shapes:
    q: (nhalo + ni + nhalo, nj, nk)
    courant: (nhalo + ni + nhalo, nj, nk)
    dxa: (nhalo + ni + nhalo, nj, nk)
    xflux: (nhalo + ni + nhalo, nj, nk)
  scalars:
    nhalo: 3
    # Default discrete options (see `configurations` for the full allowed sets).
    # iord = PPM order selector, mord = abs(iord); grid_type selects the
    # cubed-sphere edge treatment.
    iord: 5
    grid_type: 0
# Discrete (set-valued) algorithm options -- NOT continuous ranges. Each entry
# is one runnable configuration of the kernel. mord = abs(iord).
#   iord in {5, 6, 7}  : 5 = simplest monotone limiter (smt5 = bl*br < 0);
#                        6/7 = the (3*|b0| < |bl-br|) curvature limiter.
#   grid_type in {0,1,2}: apply the cubed-sphere edge regions of compute_al
#                         (grid_type < 3). (3 and >4 are unsupported upstream;
#                         iord >= 8 is out of scope for this port.)
configurations:
  iord5_gt0:
    iord: 5
    grid_type: 0
  iord6_gt0:
    iord: 6
    grid_type: 0
  iord7_gt0:
    iord: 7
    grid_type: 0
  iord5_gt1:
    iord: 5
    grid_type: 1
  iord5_gt2:
    iord: 5
    grid_type: 2
input_args:
- q
- courant
- dxa
- xflux
- nhalo
- ni
- nj
- nk
- iord
- grid_type
array_args:
- q
- courant
- dxa
- xflux
output_args:
- xflux
taxonomy:
  track: hpc
  subtrack: weather_stencils
  dwarf: structured_grids
  scale: micro
  domain: Weather
  tags:
  - fv3
  - cubed_sphere
  - ppm
  - finite_volume
  - advection
  - weather_stencil
