# Co-located benchmark manifest (Quantum ESPRESSO exact-exchange operator,
# exx_bp::vexx_bp_k_gpu). The band-parallel Fock exchange applied to trial
# wavefunctions via FFT band-pair convolution. Ported from dace-fortran's
# tests/qe/exx_bp.
#
# GATED KERNEL: the flat-SoA, collinear / norm-conserving / single-k / single-q
# active path (``vexx`` in vexx_numpy.py). It is the dace-fortran-generated C++
# SoA kernel's numpy sibling (baseline/, byte-identical flat-SoA buffer layout,
# 1-based Fortran index tables) and is fully translatable to C/C++/Fortran/numba/
# pythran/jax: the only non-elementwise op is the 3-D FFT, lowered via the
# flat-grid reshape idiom (np.fft over the (n1,n2,n3) grid, C-order reshape
# matching the C-order ``ravel_multi_index`` index tables). The naive-DFT
# lowering is O(N^2), so the size presets are kept small (the FFT translation is
# correctness-only by design -- see NumpyTranslators lib_nodes._expand_dftn).
#
# The FULL multi-config reference (collinear/noncollinear, norm-conserving/
# ultrasoft/PAW, real-space-aug, gamma_only, multi band-group) is
# ``vexx_all_paths`` in vexx_numpy.py -- NOT translatable (np.roll, ragged
# per-atom box lists) and validated separately by test_reference.py (Hermiticity
# + no-op + negrp invariance + augmentation-fires, across every config).
#
# Schema: optarena/schemas/bench_spec.schema.json
# Sizes: ngrid = cubic FFT grid edge, nbnd = occupied orbitals, m = trial bands.
name: QE Exact Exchange (vexx)
short_name: vexx
module_name: vexx
func_name: vexx
kind: microapp
# Size presets (the gate uses S). nrxxs = ngrid**3 and the naive-DFT cost is
# O(nrxxs**2), so these stay small; npw/ngm are DERIVED inside initialize_soa
# from the kinetic cutoff sphere, so any (ngrid, nbnd, m) is a valid problem.
parameters:
  S:
    ngrid: 6
    nbnd: 4
    m: 4
  M:
    ngrid: 12
    nbnd: 6
    m: 6
  L:
    ngrid: 16
    nbnd: 8
    m: 8
  fuzzed:
    ngrid: [6, 16]
    nbnd: [2, 8]
    m: [2, 8]
init:
  func_name: initialize_soa
  input_args:
  - ngrid
  - nbnd
  - m
  output_args:
  - psi
  - hpsi
  - exxbuff
  - x_occupation
  - coulomb_fac
  - dfftt_nl
  - igk_exx
  - index_xk
  - index_xkq
  - xk
  - xkq_collect
  - g
  - ibands
  - nibands
  - all_start
  - all_end
  - egrp_pairs
  - iexx_istart
  - exxalfa
  - omega
  - tpiba2
  - exxdiv
  - eps_qdiv
  - gau_scrlen
  - erf_scrlen
  - erfc_scrlen
  - yukawa
  - current_k
  - current_ik
  - nqs
  - n
  - m
  - npwx
  - npol
  - nrxxs
  - ngm
  - nks
  - n1
  - n2
  - n3
  - nbnd
  - my_egrp_id
  - max_pairs
  - jblock
  - negrp
  - iexx_start
  shapes:
    psi: (n, m)
    hpsi: (n, m)
    exxbuff: (nrxxs, nbnd, nks)
    x_occupation: (nbnd, nks)
    coulomb_fac: (ngm,)
    dfftt_nl: (ngm,)
    igk_exx: (npwx, nks)
    index_xk: (nks,)
    index_xkq: (nks, nqs)
    xk: (3, nks)
    xkq_collect: (3, nks)
    g: (3, ngm)
    ibands: (m, negrp)
    nibands: (negrp,)
    all_start: (negrp,)
    all_end: (negrp,)
    egrp_pairs: (2, max_pairs, negrp)
    iexx_istart: (negrp,)
  scalars:
    exxalfa: 0.25
    omega: 1.0
    tpiba2: 1.0
    exxdiv: 0.0
    eps_qdiv: 1.0e-08
    gau_scrlen: 0.0
    erf_scrlen: 0.0
    erfc_scrlen: 0.0
    yukawa: 0.0
  dtypes:
    psi: complex128
    hpsi: complex128
    exxbuff: complex128
    x_occupation: float64
    coulomb_fac: float64
    dfftt_nl: int64
    igk_exx: int64
    index_xk: int64
    index_xkq: int64
    xk: float64
    xkq_collect: float64
    g: float64
    ibands: int64
    nibands: int64
    all_start: int64
    all_end: int64
    egrp_pairs: int64
    iexx_istart: int64
