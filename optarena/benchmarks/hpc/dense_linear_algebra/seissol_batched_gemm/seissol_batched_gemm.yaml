# OptArena benchmark manifest -- SeisSol ADER-DG element-local "star" update,
# a tall-skinny batched GEMM Q[b] += I[b] @ star, (M,N,K)=(Nb,9,9) over a batch
# of elements b. ATTRIBUTION: element-local operator of SeisSol's ADER-DG
# seismic-wave solver (github.com/SeisSol/SeisSol; BSD-3-Clause). Batched-tiny-GEMM
# framing from yateto (github.com/ThrudPrimrose/yateto; BSD-3-Clause) + the SeisSol
# code generators gemmforge/TensorForge, and the fused-batched-GEMM paper
# Dorozhinskii, Brito Gadeschi & Bader, Concurrency and Computation: P&E 36(12),
# Article e8037, 2024, doi:10.1002/cpe.8037. Full bibliography in REFERENCES.md.
#
# Shapes are FIXED by the method order (physics): order in {7,9} is a discrete SET
# (7 = primary; Nb=84 at order 7, Nb=165 at order 9). The S/M/L/XL presets scale
# ONLY the batch (number of elements): 1024 / 16384 / 131072 / 524288, i.e.
# ~12 MB / 190 MB / 1.5 GB / 6 GB of fp64 working set at order 7 (per element =
# I + Q = 2*Nb*9*8 B ~= 12 KB; the shared 9x9 star is one negligible copy).
# Schema: optarena/schemas/bench_spec.schema.yaml
name: SeisSol ADER-DG batched star GEMM
short_name: seissol_batched_gemm
kind: microkernel
parameters:
  S:
    batch: 1024
    order: 7
  M:
    batch: 16384
    order: 7
  L:
    batch: 131072
    order: 7
  XL:
    batch: 524288
    order: 7
  order9:
    batch: 16384
    order: 9
init:
  generate: initialize
  input_args:
  - batch
  - order
  output_args:
  - Q
  - I
  - star
array_args:
- Q
- I
- star
output_args:
- Q
taxonomy:
  track: hpc
  subtrack: seissol
  dwarf: dense_linear_algebra
  domain: SeismicWave
  scale: micro
  tags:
  - seissol
  - ader_dg
  - batched_gemm
  - small_matrix
