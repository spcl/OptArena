# OptArena benchmark manifest -- adding a benchmark: see README.md.
# Schema: optarena/schemas/bench_spec.schema.yaml
name: MiniFE conjugate-gradient sparse matrix kernel
short_name: minife
kind: microapp
parameters:
  S:
    nx: 8
    ny: 8
    nz: 8
    seed: 0
    max_iter: 25
    tolerance: 1.0e-10
  M:
    nx: 16
    ny: 16
    nz: 16
    seed: 0
    max_iter: 25
    tolerance: 1.0e-10
  L:
    nx: 32
    ny: 32
    nz: 32
    seed: 0
    max_iter: 25
    tolerance: 1.0e-10
  XL:
    nx: 96
    ny: 96
    nz: 96
    seed: 0
    max_iter: 25
    tolerance: 1.0e-10
init:
  input_args:
  - nx
  - ny
  - nz
  - seed
  output_args:
  - row_offsets
  - cols
  - values
  - x
  - b
  func_name: initialize
  # nrows = (nx+1)(ny+1)(nz+1) mesh nodes; nnz is the data-dependent 27-point
  # stencil count (row_offsets[-1]). CSR index arrays are int64 (INDEX_DTYPE),
  # the value/vector arrays are the run float. Without explicit shapes the vectors
  # fall back to (nx,) and the CG temps segfault.
  arrays:
    row_offsets: {shape: "((nx + 1) * (ny + 1) * (nz + 1) + 1,)", dtype: int64}
    cols: {shape: "(nnz,)", dtype: int64}
    values: {shape: "(nnz,)", dtype: float64}
    x: {shape: "((nx + 1) * (ny + 1) * (nz + 1),)", dtype: float64}
    b: {shape: "((nx + 1) * (ny + 1) * (nz + 1),)", dtype: float64}
array_args:
- row_offsets
- cols
- values
- x
- b
output_args:
- x
taxonomy:
  track: hpc
  subtrack: minife
  dwarf: sparse_linear_algebra
  domain: Solver
precisions:
- fp64
norm_error: 1.0e-10
