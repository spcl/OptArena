name: MNIST MLP inference
short_name: mnist_infer
kind: microapp
level: 3
parameters:
  S:
    N: 64
    D: 784
    H: 16
    K: 10
  M:
    N: 256
    D: 784
    H: 16
    K: 10
  L:
    N: 1024
    D: 784
    H: 16
    K: 10
init:
  input_args: [N, D, H, K]
  output_args: [x, w1, b1, w2, b2, w3, b3, logits, pred]
  func_name: initialize
  arrays:
    x: {shape: "(N, D)", dtype: float32}
    w1: {shape: "(H, D)", dtype: float32}
    b1: {shape: "(H,)", dtype: float32}
    w2: {shape: "(H, H)", dtype: float32}
    b2: {shape: "(H,)", dtype: float32}
    w3: {shape: "(K, H)", dtype: float32}
    b3: {shape: "(K,)", dtype: float32}
    logits: {shape: "(N, K)", dtype: float32}
    pred: {shape: "(N,)", dtype: int64}
array_args: [x, w1, b1, w2, b2, w3, b3, logits, pred]
output_args: [logits]
taxonomy: {track: ml, subtrack: terminal_bench, domain: DNN}
