          dtype: int64
        - role: col_idx
          name: A_col_idx
          shape:
          - snnz
          dtype: int64
        - role: val
          name: A_val
          shape:
          - snnz
          dtype: float64
        - role: row_len
          name: A_row_len
          shape:
          - M
          dtype: int64
        - role: perm
          name: A_perm
