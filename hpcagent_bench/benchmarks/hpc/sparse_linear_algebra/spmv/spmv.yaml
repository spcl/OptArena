        - role: indptr
          name: A_indptr
          shape:
          - N + 1
          dtype: int64
        - role: indices
          name: A_indices
          shape:
          - nnz
          dtype: int64
        - role: data
          name: A_data
          shape:
          - nnz
          dtype: float64
      coo:
        buffers:
        - role: row
          name: A_row
          shape:
          - nnz
          dtype: int64
        - role: col
