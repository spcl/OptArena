# HPCAgent-Bench benchmark manifest -- adding a benchmark: see README.md.
name: Minimum Residual (MINRES) Method
kind: microkernel
level: 2
parameters:
  S:
    N: 1000
    max_iter: 50
    tol: 1.0e-06
    nnz: 10000
  M:
    N: 5000
    max_iter: 100
    tol: 1.0e-06
    nnz: 50000
  L:
    N: 8000
    max_iter: 200
    tol: 1.0e-08
    nnz: 80000
  XL:
    N: 23169
    max_iter: 200
    tol: 1.0e-08
    nnz: 100000
init:
  input_args:
  - N
  - nnz
  output_args:
  - A
  - b
  - x
  scalars:
    max_iter: 100
    tol: 1.0e-06
  arrays:
    b: (N,)
    x: (N,)
  func_name: initialize
array_args:
- A
- b
- x
output_args:
- x
sparse_layouts:
  A:
    logical_shape:
    - N
    - N
    default_dtype: float64
    variants:
      csr:
        buffers:
        - role: indptr
          name: A_indptr
          shape:
          - N + 1
          dtype: int64
        - role: indices
          name: A_indices
          shape:
          - nnz
          dtype: int64
        - role: data
          name: A_data
          shape:
          - nnz
          dtype: float64
configurations:
  csr:
    A: csr
taxonomy:
  track: hpc
  subtrack: sparse
  dwarf: sparse_linear_algebra
  domain: Solver
_note_concurrency: 'Iterative Krylov-subspace solver for symmetric (possibly indefinite) systems -- inherently
  single-core: each step uses the previous residual. Suitable only for serial / sequential ports.'
