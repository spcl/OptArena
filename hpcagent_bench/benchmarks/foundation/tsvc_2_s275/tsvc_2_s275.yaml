# HPCAgent-Bench benchmark manifest -- adding a benchmark: see README.md.
name: TSVC s275
kind: microkernel
level: 2
parameters:
  S:
    LEN_2D: 64
  M:
    LEN_2D: 256
  L:
    LEN_2D: 512
  XL:
    LEN_2D: 13377
init:
  arrays:
    aa: (LEN_2D,LEN_2D)
    bb: (LEN_2D,LEN_2D)
    cc: (LEN_2D,LEN_2D)
output_args:
- aa
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  category: control flow
  optimization: if around inner loop, interchanging needed
  puzzle: >-
    An if on the outer index i guards an entire inner j-loop, and that inner loop
    carries a genuine recurrence down the columns (aa[j,i] = aa[j-1,i] + ...),
    which is not vectorizable along j. To vectorize, the compiler must sink the
    branch and interchange the loops so i becomes the inner (vector) dimension --
    all columns advance in lockstep across the same j -- turning the outer
    conditional into a per-lane mask over the i vector while the serial j
    recurrence runs outermost.
