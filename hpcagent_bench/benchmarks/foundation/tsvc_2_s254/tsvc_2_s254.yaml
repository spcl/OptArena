# HPCAgent-Bench benchmark manifest -- adding a benchmark: see README.md.
name: TSVC s254
kind: microkernel
level: 1
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 268435455
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
output_args:
- a
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: scalar and array expansion
  optimization: scalar expansion of a carry-around variable
  puzzle: >-
    x carries the previous iteration's b value across the loop (a[i]=(b[i]+x)*.5
    then x=b[i]), a one-element shift-register recurrence. The compiler must
    recognize x as a carry-around variable equivalent to b[i-1] and expand it so
    the loop reduces to an averaging stencil that vectorizes.
