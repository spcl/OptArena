# HPCAgent-Bench benchmark manifest -- adding a benchmark: see README.md.
name: TSVC s251
kind: microkernel
level: 1
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 134217727
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
    c: (LEN_1D,)
    d: (LEN_1D,)
output_args:
- a
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: scalar and array expansion
  optimization: scalar expansion
  puzzle: >-
    A scalar temporary s = b[i]+c[i]*d[i] is reused as a[i]=s*s within each
    iteration. The single reused location s serializes the loop; expanding s
    into a per-iteration array (scalar expansion) removes the anti-dependence
    and exposes vectorization.
