foundation:
  source: tsvc_2
  category: non-logical ifs
  optimization: computed-goto multiway branch via predication
  puzzle: >-
    A computed GOTO dispatches on the integer index indx[i] (values 1-4), each
    case applying a different squared multiply-accumulate to a[i]. Vectorizing
    this multiway branch requires if-conversion: evaluating each case's update
    under an equality mask on indx[i] and merging the masked results across
    lanes.
