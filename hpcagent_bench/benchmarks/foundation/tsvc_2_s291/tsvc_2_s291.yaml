# HPCAgent-Bench benchmark manifest -- adding a benchmark: see README.md.
name: TSVC s291
kind: microkernel
level: 1
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 268435455
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
output_args:
- a
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  category: loop peeling
  optimization: wrap-around variable, 1 level
  puzzle: >-
    The index im1 lags one step behind i (im1 = i at the end of each iteration)
    but is seeded to LEN-1, so the very first iteration reads the wrapped-around
    last element b[LEN-1] while every later iteration reads b[i-1]. Recognizing
    that im1 is just i-1 after the first step, the vectorizer peels the wrap-around
    first iteration and turns the rest into the stride-1 averaging stencil
    a[i] = (b[i] + b[i-1]) * 0.5, which vectorizes directly.
