# HPCAgent-Bench benchmark manifest -- adding a benchmark: see README.md.
name: TSVC s127
kind: microkernel
level: 1
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 107374183
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
    c: (LEN_1D,)
    d: (LEN_1D,)
    e: (LEN_1D,)
output_args:
- a
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: induction variables
  optimization: induction variable recognition
  puzzle: >-
    Induction variable with multiple increments: the store index is bumped twice
    per iteration, writing a[2*i] = b[i] + c[i]*d[i] and a[2*i+1] = b[i] +
    d[i]*e[i]. The compiler must recognize the twice-incremented index as the
    affine pair 2*i and 2*i+1 so the interleaved (strided) stores to a[] can be
    vectorized.
