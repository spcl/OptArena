# HPCAgent-Bench benchmark manifest -- adding a benchmark: see README.md.
name: TSVC s317
kind: microkernel
level: 1
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 536870911
init:
  arrays:
    q: (LEN_1D,)
output_args:
- q
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: reductions
  optimization: product reduction of a loop-invariant factor
  puzzle: >-
    Repeated product of a constant, q *= 0.99, a product reduction whose
    operand never varies. Two optimizations apply: scalar-expand the factor and
    do a lane-wise product reduction, or recognize the closed form q =
    factor**n and replace the whole loop with a single power.
