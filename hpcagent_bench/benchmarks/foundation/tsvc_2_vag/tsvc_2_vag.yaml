# HPCAgent-Bench benchmark manifest -- adding a benchmark: see README.md.
name: TSVC vag
kind: microkernel
level: 1
parameters:
  S:
    LEN_1D: 512
  M:
    LEN_1D: 32768
  L:
    LEN_1D: 131072
  XL:
    LEN_1D: 178956971
init:
  arrays:
    a: (LEN_1D,)
    b: (LEN_1D,)
    ip:
      shape: (LEN_1D,)
      dtype: int32
output_args:
- a
taxonomy:
  track: foundation
  domain: classical compiler optimizations
foundation:
  source: tsvc_2
  # What vectorizing-compiler pattern this loop probes (from the original TSVC
  # source comments + the TSVC/TSVC2 analysis papers: Callahan-Dongarra-Levine
  # 1988/1991, Maleki et al. 2011).
  category: indirect addressing
  optimization: gather -- indexed load on the right-hand side
  puzzle: >-
    Vector assignment through an indirection on the RHS, a[i] = b[ip[i]], i.e.
    a gather. The source addresses are data-dependent, so vectorizing the load
    requires a hardware gather; the store side is a plain contiguous stride-1
    write, isolating the gather idiom from any other complication.
